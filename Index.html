<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacidade de Produção — Samba Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:     #1E2D3D;
    --navy-mid: #253545;
    --navy-lt:  #2E4055;
    --cream:    #F5F0E8;
    --cream-dk: #EDE8DE;
    --cream-bd: #D8CFC2;
    --card:     #FDFAF5;
    --sand:     #C9A96E;
    --sand-lt:  #D4B882;
    --sand-dim: rgba(201,169,110,0.18);
    --slate:    #4A6070;
    --ink:      #1E2D3D;
    --text-dim: #7A8E9C;
    --text-mut: #A89880;
    --white:    #FFFFFF;
    --green:    #2E6B4F;
    --green-bg: rgba(46,107,79,0.08);
    --warn:     #B85042;
    --warn-bg:  rgba(184,80,66,0.08);
    --yellow:   #8B6914;
    --yellow-bg:rgba(201,169,110,0.15);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--cream); color:var(--ink); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  .header {
    background:var(--navy); padding:20px 48px;
    display:grid; grid-template-columns:1fr auto;
    gap:24px; align-items:center;
    border-bottom:3px solid var(--sand); flex-shrink:0;
  }
  .header-brand { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.22em; color:var(--white); text-transform:uppercase; margin-bottom:6px; }
  .header h1 { font-size:22px; font-weight:300; color:var(--white); letter-spacing:-.01em; }
  .header h1 em { font-style:italic; color:var(--sand); font-weight:400; }

  /* STATS BAR */
  .stats-strip {
    display:grid; grid-template-columns:repeat(7,1fr);
    background:var(--navy-mid); border-bottom:1px solid rgba(201,169,110,0.2);
    flex-shrink:0;
  }
  .stat-box {
    padding:14px 20px; border-right:1px solid rgba(255,255,255,0.06);
    position:relative; overflow:hidden; cursor:default;
  }
  .stat-box:last-child { border-right:none; }
  .stat-box::after { content:''; position:absolute; bottom:0;left:0;right:0; height:2px; background:var(--sand); transform:scaleX(0); transform-origin:left; transition:transform .3s; }
  .stat-box:hover::after { transform:scaleX(1); }
  .stat-label { font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,0.85); font-family:'JetBrains Mono',monospace; margin-bottom:4px; }
  .stat-value { font-size:22px; font-weight:600; color:var(--sand); line-height:1; letter-spacing:-.02em; }
  .stat-value.green { color:#5DB88A; }
  .stat-value.yellow { color:var(--sand-lt); }
  .stat-value.red { color:#E07B72; }
  .stat-value.blue { color:#7AB8D4; }
  .stat-sub { font-size:9px; color:rgba(255,255,255,0.65); margin-top:3px; font-family:'JetBrains Mono',monospace; }

  /* CONTROLS */
  .controls {
    background:var(--card); border-bottom:1px solid var(--cream-bd);
    padding:10px 48px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    flex-shrink:0;
  }
  .search-wrap { position:relative; }
  .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.35; pointer-events:none; }
  input[type=text] {
    font-family:'Inter',sans-serif; background:var(--cream); border:1px solid var(--cream-bd);
    border-radius:2px; color:var(--ink); padding:7px 12px 7px 32px; font-size:12px;
    width:230px; outline:none; transition:border-color .2s;
  }
  input[type=text]:focus { border-color:var(--sand); }
  select {
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.05em;
    background:var(--cream); border:1px solid var(--cream-bd); border-radius:2px;
    color:var(--ink); padding:7px 12px; outline:none; cursor:pointer;
  }
  .filter-btn {
    font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em;
    padding:6px 12px; border-radius:1px; border:1px solid var(--cream-bd);
    background:transparent; color:var(--text-dim); cursor:pointer;
    transition:all .15s; white-space:nowrap; text-transform:uppercase;
  }
  .filter-btn:hover { border-color:var(--sand); color:var(--ink); }
  .filter-btn.active { background:var(--navy); color:var(--white); border-color:var(--navy); }
  .filter-btn.active-green { background:var(--green-bg); color:var(--green); border-color:rgba(46,107,79,.3); }
  .filter-btn.active-warn  { background:var(--warn-bg);  color:var(--warn);  border-color:rgba(184,80,66,.3); }
  .filter-btn.active-sand  { background:var(--sand-dim); color:var(--yellow); border-color:rgba(201,169,110,.4); }
  .filter-btn.active-blue  { background:rgba(122,184,212,.1); color:#3A7A9C; border-color:rgba(122,184,212,.35); }
  .filter-btn.active-fire  { background:var(--warn-bg); color:var(--warn); border-color:rgba(184,80,66,.3); }
  .count-badge { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-dim); letter-spacing:.08em; }

  /* TABLE */
  .table-wrap { flex:1; overflow-y:auto; overflow-x:auto; padding:0 48px; }
  table { width:100%; border-collapse:collapse; margin-top:12px; font-size:12.5px; }
  thead th {
    background:var(--navy); color:rgba(255,255,255,0.85);
    font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.14em;
    text-transform:uppercase; padding:11px 16px; text-align:left;
    position:sticky; top:0; z-index:5; border-bottom:2px solid var(--sand);
    cursor:pointer; user-select:none; white-space:nowrap; font-weight:400;
    transition:color .15s;
  }
  thead th:hover { color:var(--white); }
  thead th.sorted { color:var(--sand); }
  thead th.right { text-align:right; }

  tbody tr { border-bottom:1px solid var(--cream-bd); background:var(--card); transition:background .1s; }
  tbody tr:nth-child(even) { background:var(--cream); }
  tbody tr:hover { background:rgba(201,169,110,0.07); }
  tbody tr.expanded { background:rgba(201,169,110,0.05) !important; border-left:3px solid var(--sand); }
  td { padding:13px 16px; vertical-align:middle; }

  .sku-cell { display:flex; align-items:center; gap:8px; }
  .sku-code { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; color:var(--navy); }
  .star-icon { font-size:10px; }
  .desc-text { font-size:11.5px; color:var(--slate); max-width:300px; }
  .variants-pill {
    display:inline-block; background:rgba(30,45,61,.06); border:1px solid rgba(30,45,61,.15);
    border-radius:1px; padding:2px 8px; font-size:9px; color:var(--slate);
    font-family:'JetBrains Mono',monospace; letter-spacing:.05em;
  }

  /* STATUS BADGE */
  .badge { display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:1px;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;font-weight:500;white-space:nowrap;border:1px solid; }
  .badge-ok    { background:var(--green-bg);  color:var(--green); border-color:rgba(46,107,79,.25); }
  .badge-warn  { background:var(--yellow-bg); color:var(--yellow); border-color:rgba(201,169,110,.4); }
  .badge-error { background:var(--warn-bg);   color:var(--warn);   border-color:rgba(184,80,66,.25); }
  .badge-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

  /* TOOLTIP */
  .tt { position:relative; display:inline-flex; }
  .tt-box {
    display:none; position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
    background:var(--navy); border:1px solid var(--navy-lt); border-radius:2px;
    padding:10px 14px; min-width:200px; max-width:280px; z-index:999;
    box-shadow:0 8px 24px rgba(30,45,61,.25); pointer-events:none;
  }
  .tt-box::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--navy); }
  .tt:hover .tt-box { display:block; }
  .tt-title { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.15em; text-transform:uppercase; color:var(--sand); margin-bottom:6px; }
  .tt-row { display:flex; justify-content:space-between; gap:12px; font-size:11px; padding:2px 0; border-bottom:1px solid rgba(255,255,255,.06); color:rgba(255,255,255,.85); }
  .tt-row:last-child { border-bottom:none; }
  .tt-code { font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,.7); }
  .tt-miss { color:#E07B72; font-weight:600; }
  .tt-ok { font-size:11px; color:#5DB88A; }

  /* ESTOQUE CELL */
  .stock-meter { display:flex; flex-direction:column; gap:3px; align-items:flex-start; }
  .stock-val { font-family:'JetBrains Mono',monospace; font-size:11px; }
  .stock-bar-wrap { width:60px; height:3px; background:var(--cream-bd); border-radius:1px; overflow:hidden; }
  .stock-bar { height:100%; border-radius:1px; }

  /* MEDIANA CELL */
  .med-cell { display:flex; flex-direction:column; gap:3px; }
  .med-val { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--slate); font-weight:500; }
  .med-bar-wrap { width:60px; height:3px; background:var(--cream-bd); border-radius:1px; overflow:hidden; }
  .med-bar { height:100%; border-radius:1px; background:var(--sand); opacity:.6; }
  .cob-tag { font-size:9px; font-family:'JetBrains Mono',monospace; letter-spacing:.04em; }
  .cob-ok   { color:var(--green); }
  .cob-warn { color:var(--yellow); }
  .cob-low  { color:var(--warn); }

  /* SUGESTAO CELL */
  .sug-val { font-size:22px; font-weight:600; color:var(--navy); line-height:1; letter-spacing:-.02em; }
  .sug-sub { font-size:9px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:.05em; margin-top:2px; }
  .sug-ok  { font-size:13px; font-weight:600; color:var(--green); }

  /* EXPAND */
  .expand-btn {
    font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em;
    background:transparent; border:1px solid var(--cream-bd); border-radius:1px;
    color:var(--text-dim); padding:5px 10px; cursor:pointer; transition:all .15s;
    text-transform:uppercase; white-space:nowrap;
  }
  .expand-btn:hover { border-color:var(--sand); color:var(--ink); }
  .expand-btn.open { background:var(--navy); color:var(--white); border-color:var(--navy); }

  /* DETAIL PANEL */
  tr.detail-row td { padding:0; background:var(--cream-dk); border-bottom:2px solid var(--cream-bd); }
  .detail-panel { display:none; padding:16px 24px 20px; gap:10px; flex-wrap:wrap; }
  .detail-panel.open { display:flex; }

  .variant-card {
    background:var(--card); border:1px solid var(--cream-bd);
    border-top:3px solid var(--sand); padding:16px 18px; min-width:260px; flex:1;
  }
  .variant-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .variant-code { font-family:'JetBrains Mono',monospace; font-weight:500; color:var(--navy); font-size:12px; }
  .variant-max { margin-left:auto; font-weight:600; font-size:16px; color:var(--navy); }
  .variant-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .vmeta-tag { font-size:9px; font-family:'JetBrains Mono',monospace; letter-spacing:.05em; border:1px solid var(--cream-bd); border-radius:1px; padding:2px 7px; color:var(--slate); background:var(--cream); }
  .vmeta-tag.blue  { color:#3A7A9C; border-color:rgba(122,184,212,.35); background:rgba(122,184,212,.07); }
  .vmeta-tag.sand  { color:var(--yellow); border-color:rgba(201,169,110,.4); background:var(--sand-dim); }

  .missing-callout { margin-bottom:10px; background:var(--warn-bg); border:1px solid rgba(184,80,66,.2); border-left:3px solid var(--warn); padding:8px 12px; font-size:11.5px; }
  .missing-callout strong { color:var(--warn); display:block; margin-bottom:4px; font-size:9px; text-transform:uppercase; letter-spacing:.15em; font-family:'JetBrains Mono',monospace; }
  .missing-item { display:flex; justify-content:space-between; padding:2px 0; color:var(--slate); font-size:11px; }
  .missing-item .m-code { font-family:'JetBrains Mono',monospace; color:var(--warn); font-size:10px; }

  .comp-table { width:100%; border-collapse:collapse; }
  .comp-table th { font-size:8px; text-transform:uppercase; letter-spacing:.15em; color:var(--text-dim); padding:5px 8px; text-align:left; border-bottom:1px solid var(--cream-bd); font-family:'JetBrains Mono',monospace; font-weight:400; }
  .comp-table td { padding:5px 8px; font-size:11.5px; border-bottom:1px solid rgba(216,207,194,.4); }
  .comp-table tr:last-child td { border-bottom:none; }
  .comp-code { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink); }
  .comp-desc { font-size:10px; color:var(--text-dim); }
  .bottleneck td { background:var(--warn-bg) !important; }
  .bottleneck .comp-code { color:var(--warn); font-weight:600; }
  .bottleneck .comp-poss { color:var(--warn); font-weight:700; }

  ::-webkit-scrollbar { height:4px; width:6px; }
  ::-webkit-scrollbar-track { background:var(--cream-dk); }
  ::-webkit-scrollbar-thumb { background:var(--sand); border-radius:2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-brand">Samba Music · Gestão de Produção</div>
    <h1>Capacidade de Produção &amp; <em>Sugestão de Fabricação</em></h1>
  </div>
  <div style="text-align:right">
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.75);line-height:2.2;letter-spacing:.05em">
      Base de vendas <span style="color:var(--white)">2025 completo</span><br>
      Estoque <span style="color:var(--white)">Atualizado Mar/2026</span><br>
      Mediana mensal <span style="color:var(--white)">12 meses 2025</span>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="stats-strip" id="statsBar"></div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchBox" placeholder="Buscar por SKU ou descrição..." oninput="applyFilters()">
  </div>
  <select id="sortSelect" onchange="onSelectChange()">
    <option value="sugestao_desc">↓ Maior sugestão</option>
    <option value="sugestao_asc">↑ Menor sugestão</option>
    <option value="mediana_desc">↓ Maior demanda (mediana)</option>
    <option value="mediana_asc">↑ Menor demanda</option>
    <option value="estq_desc">↓ Maior estoque físico</option>
    <option value="sku_asc">SKU A → Z</option>
  </select>
  <button class="filter-btn active" id="btnAll"    onclick="setFilter('all')">Todos</button>
  <button class="filter-btn" id="btnTop"    onclick="setFilter('top')">⭐ Mais vendidos</button>
  <button class="filter-btn" id="btnOk"     onclick="setFilter('ok')">● Com insumos</button>
  <button class="filter-btn" id="btnLow"    onclick="setFilter('low')">● Parcial</button>
  <button class="filter-btn" id="btnZero"   onclick="setFilter('zero')">● Sem insumos</button>
  <button class="filter-btn" id="btnAcab"   onclick="setFilter('acabado')">📦 Em estoque físico</button>
  <button class="filter-btn" id="btnUrgent" onclick="setFilter('urgent')">🔥 Demanda &gt; estoque</button>
  <span class="count-badge" id="countBadge"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="toggleSort('sku')"     id="th_sku">SKU <span id="arr_sku">↕</span></th>
        <th>Descrição</th>
        <th>Variantes</th>
        <th>Status Insumos</th>
        <th onclick="toggleSort('estq')"    id="th_estq" class="right">Estoque Físico <span id="arr_estq">↕</span></th>
        <th onclick="toggleSort('mediana')" id="th_mediana" class="right">Mediana 2025 <span id="arr_mediana">↕</span></th>
        <th onclick="toggleSort('sugestao')" id="th_sugestao" class="right">Sugestão de Produção <span id="arr_sugestao">↓</span></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

let currentFilter='all', sortCol='sugestao', sortDir='desc';

const maxMed = Math.max(...RAW_DATA.map(s=>s.mediana_sku||0));
const maxEstq = Math.max(...RAW_DATA.map(s=>s.total_estoque||0));

RAW_DATA.forEach(sku => {
  const mm={};
  sku.variants.forEach(v => v.components.forEach(c => { if(c.available===0&&c.needed>0) mm[c.codigo]=c; }));
  sku.missing = Object.values(mm);
  sku.status = sku.total_prod===0 ? 'zero' : (sku.min_prod<50 ? 'low' : 'ok');
  sku.cobertura = (sku.mediana_sku>0 && sku.total_estoque>0) ? +(sku.total_estoque/sku.mediana_sku).toFixed(1) : null;
  sku.sugestao = sku.mediana_sku>0 ? Math.max(0, Math.round(sku.mediana_sku - sku.total_estoque)) : 0;
});

function statusBadge(sku) {
  const m = sku.missing;
  if (sku.status==='ok') {
    return `<div class="tt"><span class="badge badge-ok"><span class="badge-dot"></span> Completo</span>
      <div class="tt-box"><div class="tt-title">✓ Insumos disponíveis</div><div class="tt-ok">Produção pode iniciar.</div></div></div>`;
  }
  const cls   = sku.status==='zero' ? 'badge-error' : 'badge-warn';
  const label = sku.status==='zero' ? 'Sem insumos' : 'Parcial';
  const title = sku.status==='zero' ? '⚠ Insumos em falta' : '⚡ Estoque limitado';
  const rows  = m.length>0
    ? m.slice(0,6).map(x=>`<div class="tt-row"><span class="tt-code">${x.codigo}</span><span class="tt-miss">sem estoque</span></div>`).join('')
      + (m.length>6 ? `<div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:4px">+${m.length-6} mais</div>` : '')
    : `<div class="tt-ok" style="color:rgba(255,255,255,.7)">Verifique os detalhes.</div>`;
  return `<div class="tt"><span class="badge ${cls}"><span class="badge-dot"></span> ${label}</span>
    <div class="tt-box"><div class="tt-title">${title}</div>${rows}</div></div>`;
}

function stockCell(sku) {
  if (!sku.total_estoque) return `<span style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px">—</span>`;
  const pct = Math.min(100, (sku.total_estoque/maxEstq)*100);
  const color = pct>50 ? 'var(--navy)' : pct>20 ? 'var(--sand)' : 'var(--warn)';
  return `<div class="stock-meter">
    <div class="stock-val" style="color:${color}">${sku.total_estoque.toLocaleString('pt-BR')} un</div>
    <div class="stock-bar-wrap"><div class="stock-bar" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function medianaCell(sku) {
  if (!sku.mediana_sku) return `<span style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px">—</span>`;
  const pct = Math.min(100,(sku.mediana_sku/maxMed)*100);
  let cobHtml='';
  if (sku.cobertura!==null) {
    const c=sku.cobertura;
    const cls = c>12?'cob-ok': c>=2?'cob-ok': c>=1?'cob-warn':'cob-low';
    const label= c>12?'> 12m ✓': c>=2?`${c}m cobertura`: c>=1?`${c}m ⚠`:`${c}m 🔴`;
    cobHtml=`<span class="cob-tag ${cls}">${label}</span>`;
  }
  return `<div class="med-cell">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="med-val">${sku.mediana_sku.toLocaleString('pt-BR')}</span>
      <span style="font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace">un/mês</span>
    </div>
    <div class="med-bar-wrap"><div class="med-bar" style="width:${pct}%"></div></div>
    ${cobHtml}
  </div>`;
}

function sugestaoCell(sku) {
  if (!sku.mediana_sku) return `<span style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px">—</span>`;
  if (sku.sugestao===0) return `<span class="sug-ok">✓ Estoque OK</span>`;
  return `<div><div class="sug-val">${sku.sugestao.toLocaleString('pt-BR')}</div><div class="sug-sub">unidades</div></div>`;
}

function toggleSort(col) {
  sortDir = sortCol===col ? (sortDir==='desc'?'asc':'desc') : 'desc';
  sortCol=col; syncSelect(); applyFilters();
}
function syncSelect() {
  const sel=document.getElementById('sortSelect');
  const key=sortCol==='sku'?'sku_asc':sortCol+'_'+sortDir;
  const opts=['sugestao_desc','sugestao_asc','mediana_desc','mediana_asc','estq_desc','sku_asc'];
  if(opts.includes(key)) sel.value=key;
}
function onSelectChange() {
  const sv=document.getElementById('sortSelect').value;
  const[sc,sd]=sv.split('_');
  sortCol=sc; sortDir=sd||'desc';
  applyFilters();
}

function setFilter(f) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');
  const clsMap={all:'active',top:'active',ok:'active-green',zero:'active-warn',low:'active-sand',acabado:'active-blue',urgent:'active-fire'};
  const idMap={all:'btnAll',top:'btnTop',ok:'btnOk',zero:'btnZero',low:'btnLow',acabado:'btnAcab',urgent:'btnUrgent'};
  document.getElementById(idMap[f]).classList.add(clsMap[f]);
  applyFilters();
}

function applyFilters() {
  const q=document.getElementById('searchBox').value.toLowerCase();
  let list=RAW_DATA.filter(s=>{
    if(q&&!s.sku.toLowerCase().includes(q)&&!s.descricao.toLowerCase().includes(q)) return false;
    if(currentFilter==='top'&&!s.is_top) return false;
    if(currentFilter==='zero'&&s.status!=='zero') return false;
    if(currentFilter==='low'&&s.status!=='low') return false;
    if(currentFilter==='ok'&&s.status!=='ok') return false;
    if(currentFilter==='acabado'&&s.total_estoque===0) return false;
    if(currentFilter==='urgent'&&!(s.mediana_sku>0&&s.total_estoque<s.mediana_sku)) return false;
    return true;
  });
  list.sort((a,b)=>{
    if(sortCol==='sku') return sortDir==='asc'?a.sku.localeCompare(b.sku):b.sku.localeCompare(a.sku);
    const va=sortCol==='estq'?a.total_estoque:sortCol==='mediana'?(a.mediana_sku||0):(a.sugestao||0);
    const vb=sortCol==='estq'?b.total_estoque:sortCol==='mediana'?(b.mediana_sku||0):(b.sugestao||0);
    return sortDir==='asc'?va-vb:vb-va;
  });
  renderTable(list);
  document.getElementById('countBadge').textContent=`${list.length} SKUs`;
  ['sku','estq','mediana','sugestao'].forEach(c=>{
    document.getElementById('th_'+c)?.classList.toggle('sorted',sortCol===c);
    const arr=document.getElementById('arr_'+c);
    if(arr) arr.textContent=sortCol===c?(sortDir==='desc'?'↓':'↑'):'↕';
  });
}

function renderTable(data) {
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML='';
  data.forEach((sku,idx)=>{
    const tr=document.createElement('tr');
    tr.id='row_'+idx;
    tr.innerHTML=`
      <td><div class="sku-cell"><span class="sku-code">${sku.sku}</span>${sku.is_top?'<span class="star-icon">⭐</span>':''}</div></td>
      <td><span class="desc-text">${sku.descricao}</span></td>
      <td><span class="variants-pill">${sku.variants.length} var.</span></td>
      <td>${statusBadge(sku)}</td>
      <td style="text-align:right">${stockCell(sku)}</td>
      <td style="text-align:right">${medianaCell(sku)}</td>
      <td style="text-align:right">${sugestaoCell(sku)}</td>
      <td><button class="expand-btn" id="btn_${idx}" onclick="toggleDetail(${idx},this)">+ Ver</button></td>`;
    tbody.appendChild(tr);

    const dr=document.createElement('tr');
    dr.className='detail-row'; dr.id='detail_'+idx;
    const cards=sku.variants.map(v=>{
      const ps=v.components.map(c=>c.possible>=999999?Infinity:c.possible);
      const bn=Math.min(...ps);
      const missing=v.components.filter(c=>c.available===0&&c.needed>0);
      const mb=missing.length>0?`<div class="missing-callout"><strong>⚠ Insumos sem estoque</strong>${missing.map(m=>`<div class="missing-item"><span class="m-code">${m.codigo}</span><span>${m.descricao||''}</span></div>`).join('')}</div>`:'';
      const metaTags=[
        v.estoque_acabado>0?`<span class="vmeta-tag blue">📦 Estoque: ${v.estoque_acabado} un</span>`:'',
        v.mediana_mensal>0?`<span class="vmeta-tag sand">📊 Mediana: ${v.mediana_mensal} un/mês</span>`:''
      ].filter(Boolean).join('');
      const rows=v.components.map(c=>{
        const isBN=isFinite(bn)&&(c.possible===bn||(bn===0&&c.possible===0));
        const disp=c.possible>=999999?'∞':c.possible.toLocaleString('pt-BR');
        return `<tr class="${isBN?'bottleneck':''}">
          <td><div class="comp-code">${c.codigo}</div>${c.descricao?`<div class="comp-desc">${c.descricao}</div>`:''}</td>
          <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate)">${c.needed.toLocaleString('pt-BR')}</td>
          <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)">${c.available.toLocaleString('pt-BR')}</td>
          <td class="comp-poss" style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px">${disp}</td>
        </tr>`;
      }).join('');
      return `<div class="variant-card">
        <div class="variant-header">
          <span class="variant-code">${v.item}</span>
          <span class="variant-max">${v.max_prod.toLocaleString('pt-BR')} <span style="font-size:11px;font-weight:400;color:var(--text-dim)">produzíveis</span></span>
        </div>
        ${metaTags?`<div class="variant-meta">${metaTags}</div>`:''}
        ${mb}
        <table class="comp-table">
          <thead><tr>
            <th>Componente</th>
            <th style="text-align:right">Qtd/un</th>
            <th style="text-align:right">Disponível</th>
            <th style="text-align:right">Possível</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');
    dr.innerHTML=`<td colspan="8"><div class="detail-panel" id="panel_${idx}">${cards}</div></td>`;
    tbody.appendChild(dr);
  });
}

function toggleDetail(idx,btn) {
  const panel=document.getElementById('panel_'+idx);
  const row=document.getElementById('row_'+idx);
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.detail-panel.open').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.expand-btn.open').forEach(b=>{b.classList.remove('open');b.textContent='+ Ver';});
  document.querySelectorAll('tbody tr.expanded').forEach(r=>r.classList.remove('expanded'));
  if(!isOpen){panel.classList.add('open');btn.classList.add('open');btn.textContent='− Fechar';row.classList.add('expanded');}
}

function updateStats() {
  const ok=RAW_DATA.filter(s=>s.status==='ok').length;
  const low=RAW_DATA.filter(s=>s.status==='low').length;
  const zero=RAW_DATA.filter(s=>s.status==='zero').length;
  const emEstq=RAW_DATA.filter(s=>s.total_estoque>0).length;
  const urgent=RAW_DATA.filter(s=>s.mediana_sku>0&&s.total_estoque<s.mediana_sku).length;
  const units=RAW_DATA.reduce((a,s)=>a+s.total_prod,0);
  const top=RAW_DATA.filter(s=>s.is_top).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-box"><div class="stat-label">Total SKUs</div><div class="stat-value">${RAW_DATA.length}</div><div class="stat-sub">produtos ativos</div></div>
    <div class="stat-box"><div class="stat-label">Com insumos</div><div class="stat-value green">${ok}</div><div class="stat-sub">prontos p/ produzir</div></div>
    <div class="stat-box"><div class="stat-label">Parciais</div><div class="stat-value yellow">${low}</div><div class="stat-sub">insumo limitado</div></div>
    <div class="stat-box"><div class="stat-label">Sem insumos</div><div class="stat-value red">${zero}</div><div class="stat-sub">necessitam compra</div></div>
    <div class="stat-box"><div class="stat-label">Estoque físico</div><div class="stat-value blue">${emEstq}</div><div class="stat-sub">SKUs com produto</div></div>
    <div class="stat-box"><div class="stat-label">🔥 Demanda > estoque</div><div class="stat-value red">${urgent}</div><div class="stat-sub">risco de ruptura</div></div>
    <div class="stat-box"><div class="stat-label">Produzíveis total</div><div class="stat-value">${units.toLocaleString('pt-BR')}</div><div class="stat-sub">unidades estimadas</div></div>`;
}

document.getElementById('btnAll').classList.add('active');
updateStats();
applyFilters();
</script>
</body>
</html>
