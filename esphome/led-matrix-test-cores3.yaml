esphome:
  name: led-matrix-test-cores3
  friendly_name: "LED Matrix Test CoreS3"
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: matrix
          brightness: 30%

esp32:
  board: m5stack-cores3
  framework:
    type: esp-idf
    version: recommended

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CoreS3-Matrix-Test"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password

substitutions:
  led_pin: "GPIO2"      # CoreS3 Grove A (fio amarelo). Se não acender, teste GPIO1.
  led_count: "256"      # Matriz 16x16

light:
  - platform: esp32_rmt_led_strip
    id: matrix
    name: "Matriz 16x16"
    pin: ${led_pin}
    num_leds: ${led_count}
    rgb_order: GRB
    chipset: WS2812
    rmt_channel: 0
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
    effects:
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 32
      - addressable_scan:
          name: "Scan"
          move_interval: 35ms
          scan_width: 8

button:
  - platform: template
    name: "🔴 Tudo vermelho"
    on_press:
      - light.addressable_set:
          id: matrix
          range_from: 0
          range_to: 255
          red: 100%
          green: 0%
          blue: 0%
  - platform: template
    name: "🟢 Tudo verde"
    on_press:
      - light.addressable_set:
          id: matrix
          range_from: 0
          range_to: 255
          red: 0%
          green: 100%
          blue: 0%
  - platform: template
    name: "🔵 Tudo azul"
    on_press:
      - light.addressable_set:
          id: matrix
          range_from: 0
          range_to: 255
          red: 0%
          green: 0%
          blue: 100%
  - platform: template
    name: "🌈 Rainbow (efeito)"
    on_press:
      - light.turn_on:
          id: matrix
          brightness: 30%
          effect: "Rainbow"
  - platform: template
    name: "➡️ Scan (efeito)"
    on_press:
      - light.turn_on:
          id: matrix
          brightness: 30%
          effect: "Scan"

